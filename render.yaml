services:
  - type: web
    name: pilot-dream-app
    env: docker
    region: oregon
    plan: free
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      # Supabase PostgreSQL 사용 시 아래 DATABASE_URL을 Render에서 설정하세요
      # - key: DATABASE_URL
      #   value: postgresql://... (Supabase에서 복사한 연결 문자열)