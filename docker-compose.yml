services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: pilot-dream-app-web:latest
    ports:
      - "5000:5000"
    volumes:
      - .:/app
      - pilot_db:/app/instance
    environment:
      - FLASK_ENV=development
      - FLASK_APP=app.py
      - PYTHONUNBUFFERED=1
    command: python -m flask run --host=0.0.0.0 --port=5000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  pilot_db: