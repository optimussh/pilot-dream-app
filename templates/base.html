<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Pilot Dream App{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* Apple-style clean design */
        :root {
            --accent: #0A84FF;
            --accent-hover: #409CFF;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #0a0a0c;
            color: #f5f5f7;
            -webkit-font-smoothing: antialiased;
            letter-spacing: -0.01em;
        }

        .nav-link {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            color: #a1a1aa;
            border-radius: 9999px;
            padding: 8px 16px;
            font-weight: 500;
        }

        .nav-link:hover {
            color: #fff;
            background-color: #1f1f24;
        }

        .nav-link.active {
            color: #fff;
            background-color: #1f1f24;
            font-weight: 600;
        }

        .info-card {
            background: #1c1c1e;
            border: 1px solid #2c2c2e;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), 
                        box-shadow 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .info-card:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.35);
        }

        h1, h2, h3 {
            font-weight: 700;
            letter-spacing: -0.025em;
        }

        .accent {
            color: var(--accent);
        }

        .section-title {
            border-bottom: 1px solid #3a3a3c;
            padding-bottom: 8px;
            margin-bottom: 16px;
            font-weight: 600;
            color: #f5f5f7;
        }

        /* Apple-like buttons */
        .apple-btn {
            background: #1c1c1e;
            border: 1px solid #3a3a3c;
            color: #f5f5f7;
            transition: all 0.2s;
            border-radius: 12px;
            font-weight: 500;
        }

        .apple-btn:hover {
            background: #2c2c2e;
            border-color: var(--accent);
        }

        .apple-btn-primary {
            background: var(--accent);
            color: white;
            border: none;
        }

        .apple-btn-primary:hover {
            background: var(--accent-hover);
        }

        /* Softer text colors */
        .text-muted {
            color: #8e8e93;
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body class="min-h-screen">
    <nav class="bg-[#1c1c1e]/95 backdrop-blur-xl border-b border-[#2c2c2e] px-6 py-4 flex items-center justify-between sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <span class="text-3xl">✈️</span>
            <span class="font-semibold text-2xl tracking-tight">Pilot Dream</span>
        </div>
        <div class="flex gap-1 text-sm font-medium">
            <a href="/" class="nav-link {{ 'active' if request.path == '/' else '' }}">대시보드</a>
            <a href="/learn" class="nav-link {{ 'active' if request.path == '/learn' or request.path.startswith('/quiz') or request.path.startswith('/flash') or request.path.startswith('/scenario') or request.path.startswith('/captain') or request.path.startswith('/first-flight') else '' }}">학습</a>
            <a href="/radar" class="nav-link {{ 'active' if request.path == '/radar' else '' }}">레이더</a>
            <a href="/aircraft" class="nav-link {{ 'active' if request.path == '/aircraft' else '' }}">기종</a>
            <a href="/atc-english" class="nav-link {{ 'active' if request.path == '/atc-english' else '' }}">항공영어</a>
            <a href="/flight-planner" class="nav-link {{ 'active' if request.path == '/flight-planner' else '' }}">플래너</a>
            <a href="/logbook" class="nav-link {{ 'active' if request.path == '/logbook' else '' }}">로그북</a>
            <a href="/badges" class="nav-link {{ 'active' if request.path == '/badges' else '' }}">뱃지</a>
            <a href="/korea-career" class="nav-link {{ 'active' if request.path == '/korea-career' else '' }}">커리어</a>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-8">
        {% block content %}{% endblock %}
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
