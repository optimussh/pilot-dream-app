{% extends "base.html" %}

{% block title %}기종설계도 - Pilot Dream{% endblock %}

{% block content %}
<div class="max-w-7xl mx-auto">
    <h1 class="text-3xl font-bold mb-2">🛩️ 기종설계도</h1>
    <p class="text-gray-400 mb-6">Wikimedia 고품질 기술 도면 (Orthographic Projection) · 제원 · 좌석/화물 배치 · 상세 설명</p>
    
    <div class="flex flex-col lg:flex-row gap-6">
        <!-- Categories -->
        <div class="w-full lg:w-52">
            <h3 class="font-bold mb-3 text-sm">분류</h3>
            <div id="category-list" class="flex lg:flex-col gap-1 flex-wrap"></div>
        </div>

        <!-- Aircraft List -->
        <div class="flex-1">
            <div id="aircraft-list" class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-3"></div>
        </div>

        <!-- Details -->
        <div class="w-full lg:w-[420px] xl:w-[460px]">
            <div id="aircraft-details" class="info-card p-5 rounded-2xl min-h-[520px] text-sm">
                <p class="text-gray-400">왼쪽에서 기종을 선택해주세요.</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/gamification.js"></script>
<script>
let aircraftData = [];

async function loadAircraft() {
    const res = await fetch('/api/aircraft');
    aircraftData = await res.json();
    renderCategories();
    renderAircraftList();
}

// 기종 설계도 - Wikimedia Commons 고품질 기술 도면 (Orthographic Projection)
function renderAircraftIllustration(ac) {
    const length = parseFloat(ac.length_m) || 40;
    const wingspan = parseFloat(ac.wingspan_m) || 35;
    
    if (ac.illustration) {
        return `
            <div class="mb-4">
                <div class="text-xs text-[#ffaa00] font-semibold mb-2 flex items-center gap-2">
                    <span>기술 설계도 (Orthographic Projection)</span>
                    <span class="text-[10px] text-gray-500">(화이트 배경)</span>
                </div>
                
                <!-- 화이트 배경으로 선명하게 보이도록 한 흰색 카드 -->
                <div class="bg-[#1c1c1e] border border-[#2a2d35] rounded-2xl p-4 flex justify-center">
                    <div class="bg-white rounded-xl p-3 shadow-inner border border-gray-200" style="max-width: 100%;">
                        <img 
                            src="${ac.illustration}" 
                            alt="${ac.name} 기술 도면"
                            class="max-w-full h-auto max-h-[280px] object-contain"
                            style="image-rendering: crisp-edges; display: block;"
                            onerror="this.style.display='none'; this.parentElement.innerHTML='<div class=\\'text-gray-400 text-xs py-6 text-center\\'>기술 도면을 불러올 수 없습니다.</div>';"
                        >
                    </div>
                </div>
                
                <div class="text-[10px] text-center text-gray-400 mt-1.5">
                    ${ac.name} · 전장 ${length}m / 날개폭 ${wingspan}m · Wikimedia Commons
                </div>
            </div>
        `;
    }
    
    // Fallback (예전 SVG 스타일은 제거됨)
    return `
        <div class="mb-4 p-4 bg-[#111214] border border-[#2a2d35] rounded-xl text-center">
            <div class="text-gray-500 text-xs">기술 도면이 준비되지 않았습니다.</div>
            <div class="text-[10px] mt-1 text-gray-400">${length}m / ${wingspan}m</div>
        </div>
    `;
}

function renderCategories() {
    const container = document.getElementById('category-list');
    const categories = ['전체', '소형', '중형', '대형', '화물기', '리저널', '비즈니스', '클래식', '특수'];
    
    container.innerHTML = '';
    categories.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = `px-3 py-1 text-xs border rounded border-[#33ff33]/40 hover:bg-[#003300] ${cat === '전체' ? 'bg-[#003300]' : ''}`;
        btn.innerText = cat;
        btn.onclick = () => {
            renderAircraftList(cat === '전체' ? null : cat);
            // highlight active
            [...container.children].forEach(b => b.classList.remove('bg-[#003300]'));
            btn.classList.add('bg-[#003300]');
        };
        container.appendChild(btn);
    });
}

function renderAircraftList(filter = null) {
    const container = document.getElementById('aircraft-list');
    container.innerHTML = '';
    
    let filtered = aircraftData;
    if (filter) {
        filtered = aircraftData.filter(a => a.category === filter);
    }

    filtered.forEach(ac => {
        const card = document.createElement('div');
        card.className = 'info-card p-3 rounded-xl cursor-pointer hover:border-[#ffaa00] transition';
        const badge = ac.owned ? '<span class="text-[10px] text-[#33ff33]">✓보유</span>'
            : ac.unlocked ? '<span class="text-[10px] text-[#0A84FF]">해금가능</span>'
            : `<span class="text-[10px] text-gray-500">${ac.progress_pct||0}%</span>`;
        card.innerHTML = `
            <div class="flex justify-between items-start">
                <div class="font-bold text-base">${ac.name}</div>
                ${badge}
            </div>
            <div class="text-xs text-[#4da8da]">${ac.type}</div>
            <div class="text-xs mt-1 text-gray-400">${ac.typical_pax || ac.cap || ''}</div>
            <div class="text-[10px] mt-1 text-gray-500">${ac.manufacturer||''} · 해금 ${ac.unlock_hours||0}h</div>
        `;
        card.onclick = () => showAircraftDetail(ac);
        container.appendChild(card);
    });
}

function renderSeatMap(ac) {
    if (ac.category === '화물기') return '';

    const config = ac.typical_pax || '3-3-3';
    let html = `<div class="mt-3"><div class="text-xs font-semibold mb-1 text-[#ffaa00]">좌석 배치도</div>`;
    
    // Simple visual seat map (3-4-3 style)
    const rows = 6;
    const layout = ac.id === 'a380' ? '3-4-3' : (ac.id.includes('777') || ac.id.includes('a380') ? '3-4-3' : '3-3-3');
    
    html += `<div class="bg-black p-2 rounded text-[10px]">`;
    for (let r = 0; r < rows; r++) {
        html += `<div class="flex justify-center gap-0.5 mb-0.5">`;
        const parts = layout.split('-').map(Number);
        let seatNum = 1;
        parts.forEach((cols, section) => {
            if (section > 0) html += `<div class="w-2"></div>`; // aisle
            for (let c = 0; c < cols; c++) {
                const cls = (section === 0) ? 'bg-amber-400 text-black' : (section === 1 ? 'bg-blue-400' : 'bg-green-400');
                html += `<div class="w-3 h-3 ${cls} rounded-sm flex items-center justify-center text-[7px]">${seatNum}</div>`;
                seatNum++;
            }
        });
        html += `</div>`;
    }
    html += `<div class="text-center text-[9px] text-gray-500 mt-1">${layout} 배열 (예시 6열)</div></div></div>`;
    return html;
}

function renderA380Decks() {
    return `
        <div class="mt-3 grid grid-cols-2 gap-2 text-[10px]">
            <div class="bg-black p-2 rounded">
                <div class="font-bold text-amber-400 mb-1">1층 (Main Deck)</div>
                <div class="text-[9px]">Economy 3-4-3 (약 350~400석)<br>전방 Business / 후방 Economy</div>
            </div>
            <div class="bg-black p-2 rounded">
                <div class="font-bold text-blue-400 mb-1">2층 (Upper Deck)</div>
                <div class="text-[9px]">Business + Premium Economy<br>1층보다 조용하고 프리미엄</div>
            </div>
        </div>
    `;
}

function renderCargoDiagram(ac) {
    if (ac.category !== '화물기') return '';
    return `
        <div class="mt-3 bg-black p-2 rounded text-[10px]">
            <div class="font-bold text-[#ffaa00] mb-1">화물 배치</div>
            <div class="text-[9px]">
                • Main Deck: 20ft 컨테이너 + 팔레트 (대형 화물)<br>
                • Lower Deck: LD-3 컨테이너 (일반 화물)<br>
                • 대형 도어 2개 + 리프트 장비
            </div>
            <div class="mt-1 text-gray-500">최대 적재량: ${ac.id === 'b747f' ? '140톤+' : '100톤+'}</div>
        </div>
    `;
}

function showAircraftDetail(ac) {
    if (typeof trackActivity === 'function') trackActivity('aircraft', ac.name);
    const detail = document.getElementById('aircraft-details');
    
    // 사진 대신 기종 설계도 스타일 일러스트 사용
    const illustrationHtml = renderAircraftIllustration(ac);

    let specsHtml = `
        <div class="grid grid-cols-2 gap-x-3 text-xs mt-2">
            <div>길이: <span class="text-white">${ac.length_m}m</span></div>
            <div>날개폭: <span class="text-white">${ac.wingspan_m}m</span></div>
            <div>높이: <span class="text-white">${ac.height_m}m</span></div>
            <div>MTOW: <span class="text-white">${(ac.mtow_kg/1000).toFixed(0)} t</span></div>
            <div>항속거리: <span class="text-white">${ac.range_km} km</span></div>
            <div>순항속도: <span class="text-white">${ac.cruise_kmh} km/h</span></div>
        </div>
    `;

    let specialHtml = '';
    if (ac.id === 'a380') {
        specialHtml = renderA380Decks();
    } else if (ac.category === '화물기') {
        specialHtml = renderCargoDiagram(ac);
    } else {
        specialHtml = renderSeatMap(ac);
    }

    const desc = ac.desc || '상세 설명이 준비 중입니다.';

    detail.innerHTML = `
        <h3 class="text-lg font-bold">${ac.name}</h3>
        <div class="text-xs text-[#4da8da]">${ac.type} • ${ac.engine}</div>
        
        ${illustrationHtml}
        
        ${specsHtml}
        
        ${specialHtml}
        
        <div class="mt-3 pt-3 border-t border-white/10 text-xs text-gray-300 leading-relaxed">
            ${desc}
        </div>
        
        <div class="mt-3 text-[10px] text-gray-500">
            연료 소비: ${ac.fuel_burn} kg/km (대략)
        </div>
        <div class="mt-3 p-2 bg-black/40 rounded text-xs">
            ${ac.owned ? '<span class="text-[#33ff33]">✓ 보유 중</span>' :
              ac.unlocked ? `<a href="/hangar" class="text-[#ffaa00] hover:underline">행거에서 구매/해금 →</a>` :
              `<span class="text-gray-400">해금 ${ac.unlock_hours}h 필요 (${ac.progress_pct||0}%)</span>
               <a href="/hangar" class="text-[#0A84FF] ml-2 hover:underline">가속/구매 →</a>`}
        </div>
    `;
}

document.addEventListener('DOMContentLoaded', loadAircraft);
</script>
{% endblock %}
