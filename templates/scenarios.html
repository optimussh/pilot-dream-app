{% extends "base.html" %}
{% block title %}비상 시나리오 - Pilot Dream{% endblock %}
{% block content %}
<div class="max-w-3xl mx-auto">
    <h1 class="text-3xl font-bold mb-2">🚨 비상 상황 훈련</h1>
    <p class="text-gray-400 mb-2">
        시나리오 풀 <span id="pool-size" class="text-[#ffaa00] font-bold">100</span>개 중
        오늘의 훈련 <span class="text-[#33ff33] font-bold">4</span>개
    </p>
    <div class="text-sm text-[#0A84FF] mb-6">
        진행: <span id="sc-progress" class="font-bold">0 / 4</span> 완료
    </div>

    <div id="daily-done-banner" class="hidden mb-6 info-card p-5 rounded-2xl border border-[#33ff33]/50 text-center">
        <div class="text-3xl mb-2">🎖️</div>
        <div class="font-bold text-[#33ff33] text-lg">오늘의 비상 훈련 완료!</div>
        <p class="text-sm text-gray-400 mt-1">4개 시나리오를 모두 마쳤습니다 · 내일 새 훈련이 열립니다</p>
    </div>

    <div id="scenario-list" class="grid gap-4 mb-8"></div>
    <div id="scenario-play" class="hidden info-card p-6 rounded-2xl"></div>
</div>
<script src="/static/js/gamification.js"></script>
<script>
let scenarios = [];
let current = null;
let selectedScore = 0;
let dailyDone = false;

async function loadScenarios() {
    document.getElementById('scenario-play').classList.add('hidden');
    document.getElementById('scenario-list').classList.remove('hidden');

    const res = await fetch('/api/gamification/scenarios');
    const data = await res.json();
    scenarios = data.scenarios || [];
    dailyDone = data.daily_done || false;
    const poolSize = data.pool_size || 100;
    const completed = data.completed_count || 0;
    const total = data.total || scenarios.length;

    document.getElementById('pool-size').textContent = poolSize;
    document.getElementById('sc-progress').textContent = `${completed} / ${total}`;

    const banner = document.getElementById('daily-done-banner');
    if (dailyDone) {
        banner.classList.remove('hidden');
    } else {
        banner.classList.add('hidden');
    }

    document.getElementById('scenario-list').innerHTML = scenarios.map((s, i) => `
        <div class="info-card p-5 rounded-xl ${s.completed_today ? 'border border-[#33ff33]/40' : ''}">
            <div class="flex justify-between items-start gap-3">
                <div class="flex-1">
                    <div class="text-[10px] text-gray-500 mb-1">훈련 ${i + 1} / ${total}</div>
                    <div class="text-lg font-bold">${s.icon} ${s.title}</div>
                    <p class="text-xs text-gray-400 mt-2">${s.intro}</p>
                    ${s.completed_today ? '<span class="text-[10px] text-[#33ff33] mt-2 inline-block">✓ 오늘 완료</span>' : ''}
                </div>
                ${s.completed_today
                    ? '<span class="text-2xl shrink-0">✅</span>'
                    : `<button onclick="startScenario('${s.id}')" class="px-4 py-2 bg-red-900/50 border border-red-500 rounded text-sm shrink-0">시작</button>`}
            </div>
        </div>
    `).join('') || '<p class="text-gray-400">시나리오를 불러오지 못했습니다.</p>';
}

function startScenario(id) {
    if (dailyDone) return;
    current = scenarios.find(s => s.id === id);
    if (!current || current.completed_today) return;
    selectedScore = 0;
    document.getElementById('scenario-list').classList.add('hidden');
    const play = document.getElementById('scenario-play');
    play.classList.remove('hidden');

    const situation = current.situation || current.intro;
    const choices = current.choices || [];
    const best = choices.reduce((a, b) => (b.score > a.score ? b : a), choices[0]);

    play.innerHTML = `
        <div class="text-sm text-[#ffaa00] mb-2">${current.icon} ${current.title}</div>
        <p class="text-sm text-gray-300 mb-4 leading-relaxed">${situation}</p>
        <div class="font-semibold mb-3">당신의 선택은?</div>
        <div id="choice-area" class="space-y-2">
            ${choices.map((ch, i) => `
                <button onclick="pickChoice(${i})" class="w-full text-left p-3 bg-black/40 rounded hover:bg-black/60 text-sm choice-btn" data-idx="${i}">${ch.label}</button>
            `).join('')}
        </div>
        <div id="feedback-area" class="hidden mt-4 p-4 bg-black/50 rounded text-sm"></div>
        <button id="finish-btn" onclick="finishScenario()" class="hidden mt-4 w-full py-2 bg-[#33ff33] text-black font-bold rounded">다음으로</button>
        <div id="best-answer" class="hidden text-xs text-gray-500 mt-3">모범 답안: ${best ? best.label : ''}</div>
    `;
    play.dataset.bestIdx = choices.indexOf(best);
}

function pickChoice(i) {
    const ch = current.choices[i];
    selectedScore = ch.score;
    const bestIdx = parseInt(document.getElementById('scenario-play').dataset.bestIdx);
    const isBest = i === bestIdx;

    document.querySelectorAll('.choice-btn').forEach(btn => {
        const idx = parseInt(btn.dataset.idx);
        btn.disabled = true;
        btn.classList.remove('border', 'border-green-500', 'border-red-500', 'border-yellow-500');
        if (idx === bestIdx) btn.classList.add('border', 'border-green-500', 'bg-green-900/20');
        if (idx === i && !isBest) btn.classList.add('border', 'border-red-500', 'bg-red-900/20');
        if (idx === i && isBest) btn.classList.add('border', 'border-green-500');
    });

    const fb = document.getElementById('feedback-area');
    fb.classList.remove('hidden');
    const grade = ch.score >= 10 ? 'A' : ch.score >= 5 ? 'B' : 'C';
    const icon = isBest ? '🏆' : ch.score >= 5 ? '👍' : '⚠️';
    const best = current.choices[bestIdx];
    fb.innerHTML = `
        <div class="text-2xl mb-2">${icon}</div>
        <div class="font-bold mb-1">${isBest ? '최적의 판단!' : '등급: ' + grade}</div>
        <p class="mb-2">${ch.feedback}</p>
        ${!isBest ? `<div class="mt-3 p-2 bg-black/40 rounded border border-[#33ff33]/30">
            <div class="text-[#33ff33] font-semibold text-xs mb-1">✅ 모범 답안</div>
            <div>${best.label}</div>
            <div class="text-[#ffaa00] mt-1">${best.feedback}</div>
        </div>` : ''}`;
    document.getElementById('finish-btn').classList.remove('hidden');
}

async function finishScenario() {
    const grade = selectedScore >= 10 ? 'A' : selectedScore >= 5 ? 'B' : 'C';
    const res = await fetch('/api/gamification/scenario/complete', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            scenario_id: current.id,
            grade,
            score: selectedScore
        })
    });
    const data = await res.json();
    if (data.error) { alert(data.error); return; }

    let msg = `시나리오 완료! (+${data.reward_hours}h 가상시간)`;
    if (data.money_earned) msg += `\n💰 +₩${data.money_earned.toLocaleString()} 획득!`;
    if (data.daily_done) msg += '\n🎖️ 오늘의 비상 훈련 4개 전부 완료 보너스!';
    alert(msg);
    loadScenarios();
}

loadScenarios();
</script>
{% endblock %}
